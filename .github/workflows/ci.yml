name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

jobs:
  test:
    name: pytest (${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint with ruff
        run: |
          ruff check src tests
          ruff format --check src tests

      - name: Type check with mypy
        run: |
          mypy src --strict

      - name: Run tests with coverage
        run: |
          coverage run -m pytest -q --tb=short
          coverage report
          coverage xml -o coverage.xml

      - name: Smoke test CLI
        run: |
          python -m opencode_trading --version
          python -m opencode_trading --help

      - name: Convert sample TradingCodex workspace
        run: |
          python -m opencode_trading convert \
            --workspace tests/fixtures/sample-tcx-workspace \
            --out /tmp/oc-ci-out
          test -f /tmp/oc-ci-out/.opencode/agents.json
          test -f /tmp/oc-ci-out/.opencode/mcp.json
          test -f /tmp/oc-ci-out/.opencode/hooks.json
          test -d /tmp/oc-ci-out/.opencode/skills
