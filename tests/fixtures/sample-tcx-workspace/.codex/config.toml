[mcp_servers.tradingcodex]
command = "uvx"
args = ["--refresh", "--python", "3.14", "--from", "{{TRADINGCODEX_MCP_PACKAGE_SPEC}}", "python", "-m", "tradingcodex_cli", "mcp", "stdio"]
enabled = true
env = { TRADINGCODEX_MCP_AUTOSTART_SERVICE = "1", TRADINGCODEX_SERVICE_ADDR = "127.0.0.1:48267", TRADINGCODEX_WORKSPACE_ROOT = "{{PROJECT_DIR}}" }
enabled_tools = [
  "get_tradingcodex_status",
  "simulate_policy",
  "get_order_status",
  "list_broker_connections",
  "get_broker_connection_status",
  "list_reconciliation_runs",
  "get_order_ticket",
  "list_order_tickets",
  "record_broker_mapping_review",
  "get_positions",
  "get_portfolio_snapshot",
  "list_workflow_artifacts",
  "create_research_artifact",
  "get_research_artifact",
  "list_research_artifacts",
  "search_research_artifacts",
  "append_research_artifact_version",
  "export_research_artifact_md",
  "record_source_snapshot",
  "list_external_mcp_connections",
  "register_external_mcp_connection",
  "check_external_mcp_connection",
  "discover_external_mcp_connection",
  "review_external_mcp_tool",
  "record_audit_event"
]
default_tools_approval_mode = "prompt"
startup_timeout_sec = 20
tool_timeout_sec = 30

[shell_environment_policy]
inherit = "core"
set = {}
exclude = [
  "*API_KEY*",
  "*SECRET*",
  "*TOKEN*",
  "BROKER_*",
  "BROKER_API_KEY",
  "BROKER_API_SECRET",
  "TRADING_API_KEY",
  "TRADING_API_SECRET"
]
